name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (example: 0.1.42)"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-win-x64:
    name: Build and release Windows x64
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Generate release metadata
        id: meta
        shell: pwsh
        # 通过 env 传入不可信 / 上下文输入，避免 ${{ }} 直接插值进脚本导致命令注入。
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null

          $eventName = $env:EVENT_NAME
          $refType = $env:REF_TYPE
          $refName = $env:REF_NAME
          $inputVersion = $env:INPUT_VERSION

          if ($eventName -eq "push" -and $refType -eq "tag" -and $refName.StartsWith("v")) {
            $tag = $refName
            $version = $refName.Substring(1)
          }
          elseif (-not [string]::IsNullOrWhiteSpace($inputVersion)) {
            $version = ($inputVersion.Trim() -replace '^[vV]', '')
            $tag = "v$version"
          }
          else {
            $version = "0.1.$($env:RUN_NUMBER)"
            $tag = "v$version"
          }

          # 版本号必须是 X.Y.Z：非法值（预发布 tag、四段号、拼写错误）在此立即失败，
          # 而不是深入到 AOT publish 才因 AssemblyVersion 非法而报 CS7034。
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must be X.Y.Z (e.g. 0.1.42), got '$version' from ref/input."
          }

          $shortSha = "${{ github.sha }}".Substring(0, 7)
          # 排除正在发布的这个 tag：tag-push 时 checkout 已带上该 tag，否则它会被选成「上一个 tag」，
          # 使 previousTag..HEAD 为空、changelog 永远退化成占位符。
          $previousTag = git tag --list "v*" --sort=-v:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $logRange = "HEAD"
          } else {
            $logRange = "$previousTag..HEAD"
          }

          $changes = @(git log $logRange --pretty=format:"- %s (%h)" --no-merges)
          if ($changes.Count -eq 0) {
            $changes = @("- 内部维护更新。")
          }

          $changelogPath = Join-Path $PWD "artifacts\changelog.txt"
          $notesPath = Join-Path $PWD "artifacts\release-notes.md"

          $changes | Set-Content -LiteralPath $changelogPath -Encoding UTF8
          @(
            "# SteamEYA $tag"
            ""
            "版本号：``$tag``"
            "平台：``Windows x64``（Native AOT 原生编译 + 自包含）"
            "提交：``$shortSha``"
            ""
            "## 更新日志"
            $changes
            ""
            "## 运行依赖"
            "- Windows 10 1809 / Windows 11，x64。"
            "- 无需安装任何运行时：Native AOT 原生编译 + Windows App SDK 自包含。"
            "- 推荐直接下载并运行安装包（Setup.exe）。"
          ) | Set-Content -LiteralPath $notesPath -Encoding UTF8

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "changelog_path=$changelogPath" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore .\SteamEyaWinUI\SteamEyaWinUI.csproj -r win-x64 -p:Platform=x64

      - name: Publish Windows x64 (Native AOT)
        run: >
          dotnet publish .\SteamEyaWinUI\SteamEyaWinUI.csproj
          --configuration Release
          --runtime win-x64
          --no-restore
          -p:Platform=x64
          --output .\artifacts\build\win-x64
          -p:Version=${{ steps.meta.outputs.version }}
          -p:FileVersion=${{ steps.meta.outputs.version }}.0
          -p:AssemblyVersion=${{ steps.meta.outputs.version }}.0
          -p:InformationalVersion=${{ steps.meta.outputs.tag }}+${{ github.sha }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Package
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $expectedArtifactName = "SteamEYA-${{ steps.meta.outputs.version }}-win-x64-setup.exe"
          $metadataPath = Join-Path $PWD "artifacts\latest.json"
          $publishDir = Join-Path $PWD "artifacts\build\win-x64"
          $artifactDir = Join-Path $PWD "artifacts"

          # Native AOT 产物：exe 内含全部托管代码，剔除符号与未使用的 WebView2 组件。
          Get-ChildItem -LiteralPath $publishDir -Filter "*.pdb" -File | Remove-Item -Force
          foreach ($pattern in @(
            "Microsoft.Web.WebView2.Core*.dll",
            "WebView2Loader.dll"
          )) {
            Get-ChildItem -LiteralPath $publishDir -Filter $pattern -File | Remove-Item -Force
          }

          # Inno Setup 6 是 32 位应用，默认装到 Program Files (x86)；IS7 x64 版才在 Program Files。
          # 两个 hive、两个大版本都探一遍。
          $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            foreach ($candidate in @(
              (Join-Path $env:ProgramFiles "Inno Setup 7\ISCC.exe"),
              (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 7\ISCC.exe"),
              (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"),
              (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe")
            )) {
              if ($candidate -and (Test-Path -LiteralPath $candidate)) {
                $iscc = $candidate
                break
              }
            }
          }
          if (-not $iscc) {
            throw "Inno Setup compiler (ISCC.exe) was not found on the runner."
          }

          & $iscc "/DAppVersion=${{ steps.meta.outputs.version }}" "/DPublishDir=$publishDir" "/DOutputDir=$artifactDir" ".\build\installer\SteamEYA.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with exit code $LASTEXITCODE."
          }

          # Inno Setup 在少数场景会输出带后缀的文件名（如 setup-1.exe）；这里按模式取最新文件，避免写死路径导致误判。
          $artifact = Get-ChildItem -LiteralPath $artifactDir -Filter "SteamEYA-${{ steps.meta.outputs.version }}-win-x64-setup*.exe" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $artifact) {
            Write-Host "Expected artifact not found: $expectedArtifactName"
            Write-Host "Files under artifacts/:"
            Get-ChildItem -LiteralPath $artifactDir -File | Format-Table Name, Length, LastWriteTime -AutoSize
            throw "Installer artifact was not generated by ISCC."
          }

          $artifactPath = $artifact.FullName
          $artifactName = $artifact.Name
          # 自包含安装包通常在 25 MB 左右，40 MB 上限用于及早发现意外膨胀。
          if ($artifact.Length -gt 40MB) {
            throw "Release artifact is $([math]::Round($artifact.Length / 1MB, 2)) MB, larger than the 40 MB limit."
          }

          $sha256 = (Get-FileHash -LiteralPath $artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $changelog = @(Get-Content -LiteralPath "${{ steps.meta.outputs.changelog_path }}")
          $metadata = [ordered]@{
            version = "${{ steps.meta.outputs.version }}"
            tag = "${{ steps.meta.outputs.tag }}"
            channel = "stable"
            platform = "win-x64"
            commit = "${{ github.sha }}"
            artifactName = $artifactName
            artifactSize = $artifact.Length
            artifactSha256 = $sha256
            artifactType = "exe-installer"
            changelog = $changelog
          }
          $metadata | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $metadataPath -Encoding UTF8

          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "artifact_path=$artifactPath" >> $env:GITHUB_OUTPUT
          "metadata_path=$metadataPath" >> $env:GITHUB_OUTPUT
          "artifact_size_mb=$([math]::Round($artifact.Length / 1MB, 2))" >> $env:GITHUB_OUTPUT
          "artifact_sha256=$sha256" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $title = "SteamEYA $tag"
          $target = "${{ github.sha }}"
          $notes = "${{ steps.meta.outputs.notes_path }}"
          $artifact = "${{ steps.package.outputs.artifact_path }}"
          $metadata = "${{ steps.package.outputs.metadata_path }}"

          # 只有当本 tag 是所有 v* 里的最高版本时才标记为 Latest，否则重发旧版本会把
          # releases/latest/download/latest.json 指向旧版，客户端读到过期元数据。
          # 与 $tag 取并集：workflow_dispatch 时本地尚无该 tag（由 gh 远端创建），只比现有 tag 会误判。
          $allTags = @(git tag --list "v*") + $tag | Select-Object -Unique
          $highest = $allTags | Sort-Object { [version]($_.Substring(1)) } -Descending | Select-Object -First 1
          $isLatest = if ($highest -eq $tag) { "true" } else { "false" }

          # gh release view 成功时无 stdout，不能用管道结果判断；显式查 tagName 是否存在。
          $exists = $false
          $existing = gh release view $tag --json tagName --jq ".tagName" 2>$null
          if ($LASTEXITCODE -eq 0 -and $existing -eq $tag) { $exists = $true }

          if ($exists) {
            gh release upload $tag $artifact --clobber
            gh release upload $tag $metadata --clobber
            gh release edit $tag --title $title --notes-file $notes --target $target --latest=$isLatest
          }
          else {
            gh release create $tag $artifact $metadata --target $target --title $title --notes-file $notes --latest=$isLatest
          }
